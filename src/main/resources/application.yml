# 服务器基础配置（新增端口核心配置）
server:
  port: 11002  # 自定义端口，可改为任意未被占用的端口（如8081、9090等）
  servlet:
    context-path: /  # 上下文路径，默认/，如需前缀可改为/timeseries（访问地址变为http://localhost:8080/timeseries/...）

# Spring 应用基础配置
spring:
  application:
    name: timeseries-db
  # 可选：添加日志级别配置（配合logback）
  logging:
    level:
      com.timeseries.db: DEBUG  # 核心包日志级别
      org.springframework: WARN # 减少Spring冗余日志

# 时序库自定义存储配置（原有配置保留）
timeseries:
  storage:
    base-path: ./timeseries-data  # 本地存储根路径
    shard-type: HOUR              # 分片类型：HOUR/DAY（按小时/天切分文件）
    cache:
      max-size: 10000             # 内存缓存最大数据点数（控制内存占用）
      expire-minutes: 10          # 缓存过期时间
    async:
      core-pool-size: 4
      max-pool-size: 8
      queue-capacity: 1000